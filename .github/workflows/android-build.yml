name: Build Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          components: build-tools;33.0.2,platforms;android-33

      - name: Build Android APK (Gradle)
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
          working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android SDK tools
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          sudo apt-get update -y
          sudo apt-get install -y unzip wget
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip

          # Normalize extracted command line tools path
          if [ -d "cmdline-tools/cmdline-tools" ]; then
            rm -rf cmdline-tools/latest
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/cmdline-tools/* cmdline-tools/latest/
          else
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          fi

          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.0" "cmdline-tools;latest"

      - name: Set Android env vars
        run: |
          echo "ANDROID_HOME=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV
          echo "PATH=${{ runner.temp }}/android-sdk/cmdline-tools/latest/bin:${{ runner.temp }}/android-sdk/platform-tools:${PATH}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Ensure Android platform exists
        run: |
          # If the android folder or gradlew is missing, do a clean add.
          if [ ! -d android ] || [ ! -f android/gradlew ]; then
            rm -rf android
            npx cap add android
          fi
          npx cap sync android

      - name: Verify gradlew is present
        run: |
          cd android
          ls -la
          if [ ! -f gradlew ]; then
            echo "ERROR: gradlew not found in android/. Please verify npx cap add android succeeded."
            exit 1
          fi

      - name: Assemble debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Upload APK artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/**/*.apk
          if-no-files-found: error

      - name: Assemble release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Upload APK artifact (release)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/**/*.apk
          if-no-files-found: error
